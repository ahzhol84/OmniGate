# config.yaml
global:
  redis_addr: "127.0.0.1:6379"
  db_dsn: "root:ffedcw@tcp(127.0.0.1:3306)/db_name?parseTime=True&loc=Local"

plugins:
  # 温湿度传感器插件 - 支持多个设备
  - name: "dyf20a_poller"
    enabled: true
    configs:
      - auth:
          username: "北京佳莱康健康科技公司"
          password: "123456"
          login_type: "1"
          base_url: "https://api.dayufeng.cn"
          compony_name: "大昱丰"
        devices:
          - id: "930813"
            unique_id: "jlk|dyf20a|DYF20A|930813"
            type: "DYF20A"
            interval: "5m"
          # - id: "930814"
          #   type: "DYF20A"
          #   interval: "1m"
      # - auth:
      #     username: "另一家公司"
      #     password: "password123"
      #     login_type: "1"
      #     base_url: "https://api.dayufeng.cn"
      #     compony_name: "第二公司"
      #   devices:
      #     - id: "940001"
      #       type: "DYF20A"
      #       interval: "3m"

  # HTTP监听插件 - 支持多个端口
  - name: "generic_http_listener"
    enabled: true
    configs:
      - listen_addr: ":8081"
        compony_name: "立可安"
        device_id: "IMEI:861178060450626"
        unique_id: "lika|generic_http_listener|GENERIC|IMEI:861178060450626"
        device_type: "GENERIC"
        # 可选：当请求 /device/realtime 且 device_type 匹配时，直接调用该URL实时拉取
        # realtime_url: "http://127.0.0.1:9000/device/realtime"
        realtime_ttl_seconds: 120
        history_ttl_seconds: 60
        username: "admin"
        password: "password"
        auth_key: "iot-shared-secret-2026"
      # - listen_addr: ":8082"
      #   compony_name: "立可安"
      #   device_id: "IMEI:861178060450627"
      # - listen_addr: ":8083"
      #   compony_name: "第三公司"
      #   device_id: "DEVICE_001"

  # HTTP响应插件 - 支持多个服务实例
  - name: "simple_http_responder"
    enabled: false
    configs:
      - listen_addr: ":8084"
        username: "admin"
        password: "password"
        auth_key: "iot-shared-secret-2026"
      - listen_addr: ":8085"
        username: "admin"
        password: "password"
        auth_key: "iot-shared-secret-2026-2"

  # 睡眠监测插件 - 支持多个设备
  - name: "sxb"
    enabled: false
    configs:
      - compony_name: "佳莱康"
        client_id: "37A814FDF81F4214"
        client_secret: "F4FA67E40B7C4990ADACB2C1743E8D80"
        device_id: "AC1518F7E350"
        unique_id: "jlk|sxb|SXB|AC1518F7E350"
        base_url: "https://openapi.sleepthing.com"
        poll_interval: 0
        listen_addr: ":8084"
        auth_username: "admin"
        auth_password: "password"
        auth_key: "iot-shared-secret-2026"
      # - compony_name: "第二公司"
      #   client_id: "CLIENT_002"
      #   client_secret: "SECRET_002"
      #   device_id: "DEVICE_002"
      #   base_url: "https://openapi.sleepthing.com"
      #   poll_interval: 30
      #   不设置listen_addr则只启用轮询模式