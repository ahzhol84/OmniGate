# config.yaml
global:
  redis_addr: "127.0.0.1:6379"
  db_dsn: "root:xirfdTWg1Gr!A1IJ@tcp(47.94.14.70:3306)/db_name?parseTime=True&loc=Local"
  websocket:
    enabled: true
    listen_addr: ":8088"
    path: "/ws/events"
    auth_header: "X-Iot-Token"
    auth_token: ""
    event_buffer_size: 1024
    write_timeout_ms: 2000

plugins:
  # 温湿度传感器插件 - 支持多个设备
  - name: "dyf20a_poller"
    enabled: false
    configs:
      - auth:
          username: "北京佳莱康健康科技公司"
          password: "123456"
          login_type: "1"
          base_url: "https://api.dayufeng.cn"
          compony_name: "大昱丰"
        devices:
          - id: "930813"
            unique_id: "jlk|dyf20a|DYF20A|930813"
            type: "DYF20A"
            interval: "5m"
          # - id: "930814"
          #   type: "DYF20A"
          #   interval: "1m"
      # - auth:
      #     username: "另一家公司"
      #     password: "password123"
      #     login_type: "1"
      #     base_url: "https://api.dayufeng.cn"
      #     compony_name: "第二公司"
      #   devices:
      #     - id: "940001"
      #       type: "DYF20A"
      #       interval: "3m"

  # HTTP监听插件 - 支持多个端口
  - name: "generic_http_listener"
    enabled: true
    configs:
      - listen_addr: ":8081"
        compony_name: "立可安"
        device_id: "IMEI:861178060450626"
        unique_id: "lika|generic_http_listener|GENERIC|IMEI:861178060450626"
        device_type: "GENERIC"
        # 可选：当请求 /device/realtime 且 device_type 匹配时，直接调用该URL实时拉取
        # realtime_url: "http://127.0.0.1:9000/device/realtime"
        realtime_ttl_seconds: 120
        history_ttl_seconds: 60
        username: "admin"
        password: "password"
        auth_key: "iot-shared-secret-2026"
      # - listen_addr: ":8082"
      #   compony_name: "立可安"
      #   device_id: "IMEI:861178060450627"
      # - listen_addr: ":8083"
      #   compony_name: "第三公司"
      #   device_id: "DEVICE_001"

  # HTTP响应插件 - 支持多个服务实例
  - name: "simple_http_responder"
    enabled: false
    configs:
      - listen_addr: ":8084"
        username: "admin"
        password: "password"
        auth_key: "iot-shared-secret-2026"
      - listen_addr: ":8085"
        username: "admin"
        password: "password"
        auth_key: "iot-shared-secret-2026-2"

  # 睡眠监测插件 - 支持多个设备
  - name: "sxb"
    enabled: false
    configs:
      - compony_name: "佳莱康"
        client_id: "37A814FDF81F4214"
        client_secret: "F4FA67E40B7C4990ADACB2C1743E8D80"
        device_id: "AC1518F7E350"
        unique_id: "jlk|sxb|SXB|AC1518F7E350"
        base_url: "https://openapi.sleepthing.com"
        poll_interval: 0
        listen_addr: ":8084"
        auth_username: "admin"
        auth_password: "password"
        auth_key: "iot-shared-secret-2026"
      # - compony_name: "第二公司"
      #   client_id: "CLIENT_002"
      #   client_secret: "SECRET_002"
      #   device_id: "DEVICE_002"
      #   base_url: "https://openapi.sleepthing.com"
      #   poll_interval: 30
      #   不设置listen_addr则只启用轮询模式

  # 爱牵挂 X8 推送接收插件（推荐单 URL 模式）
  - name: "aiqiangua_x8"
    enabled: true
    configs:
      - compony_name: "佳莱康"
        listen_addr: ":8090"
        # 对方可直接配置该 URL 作为统一回调入口
        receive_path: "/push/aiqiangua/x8"
        # 可选：同时支持 /push/aiqiangua/x8/location 等路径
        path_prefix: "/push/aiqiangua/x8"
        device_type: "AIQIANGUA_X8"
        # 可选：按来源IP做白名单（支持单IP与CIDR）
        # allowed_ips:
        #   - "120.24.56.48"
        #   - "120.24.56.0/24"

  # 立可安回调接收插件（JSON推送）
  # 设计说明：仅负责 HTTP 接收，实时推送由全局 websocket 统一处理
  - name: "likaan_push_listener"
    enabled: true
    configs:
      - listen_addr: ":8086"
        # 立可安当前实际回调为 POST /
        receive_path: "/"
        compony_name: "立可安"
        device_type: "LIKAAN"
        # 可选：为空表示不校验
        auth_header: "X-Likaan-Token"
        auth_token: ""
        request_limit_bytes: 1048576

  # OneNET HTTP推送接收插件
  # - GET: URL验证（回显msg，支持可选token验签）
  # - POST: 接收设备消息并做JSON解析打印
  - name: "onenet_http_push_listener"
    enabled: true
    configs:
      - listen_addr: ":8087"
        receive_path: "/push/onenet"
        compony_name: "OneNET"
        device_type: "ONENET"
        data_type: "ONENET_PUSH"
        # URL验证：OneNET 控制台里的 token 用于 signature 验签，不会直接作为 HTTP header 发送
        enable_token_verify: true
        verify_token: "1234"
        # 推送消息体若未额外附带自定义鉴权头，则这里保持为空；收到真实请求后再按需开启
        auth_header: "token"
        auth_token: ""
        request_limit_bytes: 2097152